<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tareas | Academix Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <button class="btn btn-outline-light btn-sm me-3 rounded-pill px-3" onclick="window.location.href='dashboard.html'">
                <i class="bi bi-arrow-left me-1"></i> Volver
            </button>
            <span class="navbar-brand fw-bold mx-auto">
                <i class="bi bi-check2-all text-warning me-2"></i>Tareas
            </span>
            <button class="btn btn-danger btn-sm rounded-circle shadow-sm" onclick="logout()">
                <i class="bi bi-power"></i>
            </button>
        </div>
    </nav>

    <main class="container py-5">
        <div class="text-center mb-4 animate-fade-in">
            <h2 id="nombreMateria" class="fw-extrabold display-6 text-dark mb-3">Cargando Materia...</h2>
            
            <div id="statsTareas" class="d-flex gap-3 justify-content-center mb-4" style="display: none !important;">
                <div class="badge bg-primary rounded-pill px-3 py-2 shadow-sm">
                    <i class="bi bi-list-task me-1"></i> Total: <span id="totalTareas">0</span>
                </div>
                <div class="badge bg-warning text-dark rounded-pill px-3 py-2 shadow-sm">
                    <i class="bi bi-hourglass-split me-1"></i> Pendientes: <span id="pendientesTareas">0</span>
                </div>
                <div class="badge bg-success rounded-pill px-3 py-2 shadow-sm">
                    <i class="bi bi-check-all me-1"></i> Completadas: <span id="completadasTareas">0</span>
                </div>
            </div>

            <div class="divider mx-auto mb-4" style="width: 60px; height: 4px; background: #0d6efd; border-radius: 2px;"></div>
            
            <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalTarea">
                <i class="bi bi-plus-lg me-2"></i> Añadir Tarea
            </button>
        </div>

        <div id="contenedorTareas" class="row justify-content-center g-4">
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Cargando...</span>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="modalTarea" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold"><i class="bi bi-plus-circle-fill text-primary me-2"></i>Nueva Tarea</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Título de la Tarea</label>
                        <input type="text" id="nuevoTituloTarea" class="form-control bg-light border-0 py-2" placeholder="Ej: Mapa conceptual de SQL">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Descripción</label>
                        <textarea id="nuevaDescTarea" class="form-control bg-light border-0" rows="3" placeholder="Detalles de lo que debes hacer..."></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Fecha de Entrega</label>
                        <input type="date" id="nuevaFechaTarea" class="form-control bg-light border-0">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" onclick="guardarTarea()">Crear Tarea</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/tareas.js"></script>
</body>
</html>
