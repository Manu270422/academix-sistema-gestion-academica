<div class="container mt-5">
    <div class="card shadow-lg border-0 p-4 mx-auto" style="max-width: 500px; border-radius: 20px;">
        <h3 class="fw-bold text-center mb-4">Nueva Contraseña</h3>
        <p class="text-muted text-center small">Ingresa tu nueva clave de acceso para Academix.</p>
        
        <div id="formRestablecer">
            <div class="mb-3">
                <label class="form-label small fw-bold">Nueva Contraseña</label>
                <input type="password" id="pass1" class="form-control bg-light border-0 py-2" placeholder="Mínimo 8 caracteres">
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Confirmar Contraseña</label>
                <input type="password" id="pass2" class="form-control bg-light border-0 py-2" placeholder="Repite tu contraseña">
            </div>

            <button class="btn btn-primary w-100 py-3 rounded-pill fw-bold shadow-sm mt-3" onclick="confirmarCambio()">
                ACTUALIZAR CONTRASEÑA
            </button>
        </div>

        <div id="mensajeFinal" class="text-center d-none">
            <i class="bi bi-check-circle-fill text-success" style="font-size: 3rem;"></i>
            <h5 class="fw-bold mt-3">¡Todo listo!</h5>
            <p class="small text-muted">Tu contraseña ha sido actualizada con éxito.</p>
            <a href="login.html" class="btn btn-outline-primary rounded-pill px-4">Ir al Login</a>
        </div>
    </div>
</div>
