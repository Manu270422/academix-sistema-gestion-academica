<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Academix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center">

    <div class="login-card p-4 p-md-5 shadow-lg text-center">
        <div class="icon-circle mb-4 mx-auto">
            <i class="bi bi-mortarboard-fill"></i>
        </div>
        <h1 class="fw-bold h3 mb-2">Academix</h1>
        <p class="text-muted mb-4">Ingresa tus credenciales para continuar</p>

        <form onsubmit="event.preventDefault(); login();">
            <div class="form-floating mb-3">
                <input type="email" class="form-control border-0 bg-light" id="correo" placeholder="name@example.com" required>
                <label for="correo">Correo electrónico</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" class="form-control border-0 bg-light" id="password" placeholder="Contraseña" required>
                <label for="password">Contraseña</label>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-3 fw-bold shadow">
                INGRESAR <i class="bi bi-box-arrow-in-right ms-2"></i>
            </button>
        </form>
        
        <div class="mt-3">
            <a href="recuperar.html" class="text-decoration-none small text-primary">¿Olvidaste tu contraseña?</a>
        </div>
        
        <p class="mt-4 small text-muted">© 2026 Sistema de Gestión ADSO</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/app.js"></script>
</body>
</html>
