<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Academix</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#"><i class="bi bi-lightning-charge-fill me-2 text-warning"></i>ACADEMIX</a>
            <div class="d-flex align-items-center">
                <span class="text-white-50 me-3 d-none d-md-block" id="bienvenida"></span>
                <button class="btn btn-danger btn-sm rounded-pill px-3" onclick="logout()">
                    <i class="bi bi-power"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container py-5">
        <header class="row mb-5 align-items-center">
            <div class="col">
                <h2 class="fw-bold mb-0">Mis Materias</h2>
                <p class="text-muted mb-0">Visualiza el progreso de tus asignaturas</p>
            </div>
            <div class="col-auto">
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#modalMateria">
                    <i class="bi bi-plus-lg me-2"></i>Nueva Materia
                </button>
            </div>
        </header>

        <div id="listaMaterias" class="row g-4">
            </div>
    </main>

    <div class="modal fade" id="modalMateria" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 20px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="fw-bold"><i class="bi bi-journal-plus text-primary me-2"></i>Añadir Materia</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Nombre de la Materia</label>
                        <input type="text" id="nuevoNombreMat" class="form-control bg-light border-0 py-2" placeholder="Ej: Bases de Datos II">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Descripción</label>
                        <textarea id="nuevaDescMat" class="form-control bg-light border-0" rows="3" placeholder="De qué trata esta materia..."></textarea>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-light rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary rounded-pill px-4" onclick="guardarMateria()">Guardar Materia</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
