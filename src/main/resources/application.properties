# ===============================
# CONFIGURACIÓN DE LA BASE DE DATOS
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/academix_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=teamomama@1813
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===============================
# CONFIGURACIÓN DEL SERVIDOR
# ===============================
server.port=8080
# NOTA: He quitado el context-path global para que tus archivos HTML 
# y JS en 'static' carguen directamente sin prefijos extraños.
server.servlet.context-path=

# ===============================
# CONFIGURACIÓN DE CORREO (SMTP - GMAIL)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Pon aquí tu correo real de Gmail para las pruebas
spring.mail.username=tu-correo@gmail.com
# IMPORTANTE: No es tu clave normal, es la "Contraseña de Aplicación" de 16 letras
spring.mail.password=tu-contraseña-de-aplicacion
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Tiempo de espera para evitar que el servidor se quede colgado
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ===============================
# CONFIGURACIÓN DE SEGURIDAD
# ===============================
# Esto permite que Spring Security no bloquee tus archivos estáticos
spring.security.debug=false
logging.level.org.springframework.security=INFO

# ===============================
# THYMELEAF (Para las plantillas de correo)
# ===============================
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.cache=false